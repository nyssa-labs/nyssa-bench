task_id: inspect_package
engine: maniskill
robot: panda
scene: warehouse_inspection
description: Move to inspect a package label while avoiding occlusion.
objects:
  - name: package
    type: box
    randomized_pose: true
  - name: label
    type: visual_marker
success:
  engine_env_ids:
    maniskill: PickCube-v1
  label_visible: true
  max_time_seconds: 30
  max_collisions: 1
  max_steps: 10
randomization:
  lighting: true
  camera_pose: true
  occlusion: true
metrics: [success_rate, completion_time, path_efficiency, out_of_distribution_failure_rate]
failure_labels: [occlusion_failure, missed_target, out_of_distribution_layout]
