task_id: turn_handle
engine: maniskill
robot: panda
scene: control_panel
description: Turn a handle to a target angle.
objects:
  - name: handle
    type: articulated
success:
  joint_angle_min: 70
  max_time_seconds: 40
  max_steps: 12
randomization:
  handle_pose: true
  friction_range: [0.3, 1.2]
metrics: [success_rate, completion_time, collision_count, path_efficiency]
failure_labels: [bad_grasp, unstable_contact, joint_limit_failure]
