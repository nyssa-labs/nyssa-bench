task_id: rotate_knob
engine: maniskill
robot: panda
scene: appliance_panel
description: Rotate a knob to the requested target angle.
objects:
  - name: knob
    type: articulated
success:
  joint_angle_min: 90
  max_time_seconds: 40
  max_steps: 12
randomization:
  knob_pose: true
  friction_range: [0.3, 1.4]
metrics: [success_rate, completion_time, collision_count, path_efficiency]
failure_labels: [bad_grasp, unstable_contact, joint_limit_failure, missed_target]
