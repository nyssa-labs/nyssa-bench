task_id: close_drawer
engine: maniskill
robot: panda
scene: cabinet
description: Push an open drawer closed.
objects:
  - name: drawer
    type: articulated
success:
  joint_position_max: 0.05
  max_time_seconds: 35
  max_steps: 12
randomization:
  initial_joint_position: [0.4, 1.0]
  friction_range: [0.3, 1.0]
metrics: [success_rate, completion_time, collision_count, path_efficiency]
failure_labels: [unstable_contact, joint_limit_failure, planner_stuck]
