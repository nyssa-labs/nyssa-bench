task_id: open_drawer
engine: maniskill
robot: panda
scene: cabinet
description: Pull a drawer open past the success threshold.
objects:
  - name: drawer
    type: articulated
success:
  joint_position_min: 0.8
  max_time_seconds: 45
  max_steps: 14
randomization:
  handle_pose: true
  friction_range: [0.3, 1.0]
metrics: [success_rate, completion_time, collision_count, path_efficiency]
failure_labels: [bad_grasp, joint_limit_failure, unstable_contact, planner_stuck]
